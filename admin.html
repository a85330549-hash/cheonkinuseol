<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>천기누설 | 관리자</title>
  <script>(function(){var l=localStorage.getItem('chunggi_lang')||localStorage.getItem('cheonki_lang')||'ko';document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);})();</script>
  <link rel="icon" href="./img/yinyang.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #0a0e14;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .admin-nav {
      position: fixed;
      top: 0; left: 0; width: 100%;
      background: rgba(10,14,20,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(197,160,89,0.3);
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .admin-nav-logo {
      font-size: 1.1rem;
      font-weight: 900;
      color: #c5a059;
      letter-spacing: -0.03em;
    }

    .admin-nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .admin-user-email {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }

    .btn-back {
      font-size: 0.85rem;
      color: #c5a059;
      background: rgba(197,160,89,0.1);
      border: 1px solid rgba(197,160,89,0.3);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-back:hover { background: rgba(197,160,89,0.2); }

    /* 접근 거부 화면 */
    #access-denied {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0e14;
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #access-denied .icon { font-size: 3rem; }
    #access-denied h2 { color: #e74c3c; font-size: 1.4rem; }
    #access-denied p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

    /* 로딩 화면 */
    #auth-loading {
      display: flex;
      position: fixed;
      inset: 0;
      background: #0a0e14;
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(197,160,89,0.2);
      border-top-color: #c5a059;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 메인 컨텐츠 */
    .admin-main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 20px 40px;
    }

    .admin-header {
      margin-bottom: 28px;
    }

    .admin-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #c5a059;
      margin-bottom: 4px;
    }

    .admin-header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    /* 탭 */
    .admin-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(197,160,89,0.15);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .admin-tab {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .admin-tab:hover { color: #c5a059; }

    .admin-tab.active {
      background: rgba(197,160,89,0.15);
      color: #c5a059;
      border: 1px solid rgba(197,160,89,0.3);
    }

    /* 패널 */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    /* 카드 */
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(197,160,89,0.15);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c5a059;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(197,160,89,0.15);
    }

    /* 사용자 테이블 */
    .user-table-wrap {
      overflow-x: auto;
    }

    .user-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .user-table th {
      text-align: left;
      padding: 10px 14px;
      color: rgba(197,160,89,0.8);
      font-weight: 600;
      border-bottom: 1px solid rgba(197,160,89,0.2);
      white-space: nowrap;
    }

    .user-table td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.75);
      vertical-align: middle;
    }

    .user-table tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .badge-google { background: rgba(66,133,244,0.2); color: #4285f4; border: 1px solid rgba(66,133,244,0.3); }
    .badge-email  { background: rgba(197,160,89,0.15); color: #c5a059; border: 1px solid rgba(197,160,89,0.3); }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }

    /* 공지사항 폼 */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: rgba(197,160,89,0.8);
      font-weight: 600;
      margin-bottom: 7px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(197,160,89,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: rgba(197,160,89,0.5); }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .btn-primary {
      background: linear-gradient(135deg, #c5a059, #a07840);
      color: #0a0e14;
      border: none;
      border-radius: 8px;
      padding: 11px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-danger {
      background: transparent;
      color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-danger:hover { background: rgba(231,76,60,0.1); }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 24px;
      background: rgba(30,40,55,0.97);
      border: 1px solid rgba(197,160,89,0.4);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.88rem;
      color: #c5a059;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 500;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* 공지 목록 */
    .notice-item {
      padding: 14px 16px;
      border: 1px solid rgba(197,160,89,0.12);
      border-radius: 8px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.02);
    }

    .notice-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .notice-item-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #c5a059;
    }

    .notice-item-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
    }

    .notice-item-body {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* 방문자 통계 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(197,160,89,0.07);
      border: 1px solid rgba(197,160,89,0.2);
      border-radius: 10px;
      padding: 18px 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #c5a059;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
    }

    .bar-chart { margin-top: 4px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .bar-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      min-width: 70px;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c5a059, #e8c47a);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .bar-count {
      font-size: 0.78rem;
      color: rgba(197,160,89,0.8);
      min-width: 36px;
      text-align: right;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(197,160,89,0.3);
      color: rgba(197,160,89,0.7);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      float: right;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: rgba(197,160,89,0.1); color: #c5a059; }

    .section-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

    @media (max-width: 600px) {
      .admin-tabs { flex-direction: column; }
      .admin-tab { text-align: left; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- 로딩 화면 -->
  <div id="auth-loading">
    <div class="spinner"></div>
    <p style="color:rgba(255,255,255,0.4);font-size:0.85rem">인증 확인 중...</p>
  </div>

  <!-- 접근 거부 화면 -->
  <div id="access-denied">
    <div class="icon">🚫</div>
    <h2>접근 권한이 없습니다</h2>
    <p>관리자 계정으로 로그인하세요.</p>
    <a href="index.html" style="margin-top:12px;color:#c5a059;font-size:0.9rem;">← 메인으로 돌아가기</a>
  </div>

  <!-- 네비게이션 -->
  <nav class="admin-nav">
    <div class="admin-nav-logo">🔮 천기누설 관리자</div>
    <div class="admin-nav-right">
      <span class="admin-user-email" id="admin-email-display"></span>
      <a href="index.html" class="btn-back">← 사이트로</a>
    </div>
  </nav>

  <!-- 메인 -->
  <main class="admin-main" id="admin-content" style="display:none;">
    <div class="admin-header">
      <h1>관리자 대시보드</h1>
      <p id="admin-summary-text">데이터를 불러오는 중...</p>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('users')">👥 가입 사용자</button>
      <button class="admin-tab" onclick="switchAdminTab('notices')">📢 공지사항</button>
      <button class="admin-tab" onclick="switchAdminTab('stats')">📊 방문자 통계</button>
    </div>

    <!-- 사용자 목록 패널 -->
    <div class="admin-panel active" id="panel-users">
      <div class="card">
        <div class="card-title">
          가입 사용자 목록
          <button class="refresh-btn" onclick="loadUsers()">새로고침</button>
        </div>
        <div class="user-table-wrap" id="users-container">
          <div class="empty-state">불러오는 중...</div>
        </div>
      </div>
    </div>

    <!-- 공지사항 패널 -->
    <div class="admin-panel" id="panel-notices">
      <div class="card">
        <div class="card-title">새 공지사항 등록</div>
        <div class="form-group">
          <label>제목</label>
          <input type="text" id="notice-title" placeholder="공지 제목을 입력하세요">
        </div>
        <div class="form-group">
          <label>내용</label>
          <textarea id="notice-body" placeholder="공지 내용을 입력하세요"></textarea>
        </div>
        <div class="form-group">
          <label>중요도</label>
          <select id="notice-priority">
            <option value="normal">일반</option>
            <option value="important">중요</option>
            <option value="urgent">긴급</option>
          </select>
        </div>
        <button class="btn-primary" onclick="postNotice()" id="notice-submit-btn">공지 등록</button>
      </div>

      <div class="card">
        <div class="card-title">
          등록된 공지사항
          <button class="refresh-btn" onclick="loadNotices()">새로고침</button>
        </div>
        <div id="notices-list">
          <div class="empty-state">불러오는 중...</div>
        </div>
      </div>
    </div>

    <!-- 방문자 통계 패널 -->
    <div class="admin-panel" id="panel-stats">
      <div class="stats-grid" id="stats-summary">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">총 방문 수</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-today">-</div>
          <div class="stat-label">오늘 방문</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-users">-</div>
          <div class="stat-label">총 가입자</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-week">-</div>
          <div class="stat-label">이번 주 방문</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          페이지별 방문 통계 (최근 30일)
          <button class="refresh-btn" onclick="loadStats()">새로고침</button>
        </div>
        <div class="bar-chart" id="page-stats-chart">
          <div class="empty-state">불러오는 중...</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">최근 30일 일별 방문 추이</div>
        <div id="daily-chart">
          <div class="empty-state">불러오는 중...</div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const ADMIN_EMAIL = 'a85330549@gmail.com';

    const PAGE_NAMES = {
      home: '홈',
      newyear: '신년운세',
      monthly: '월간운세',
      love: '연애/궁합',
      worry: '연애고민',
      meeting: '만남',
      tenyear: '십년후운세'
    };

    let _adminUser = null;

    /* 인증 확인 */
    auth.onAuthStateChanged(user => {
      document.getElementById('auth-loading').style.display = 'none';
      if (user && user.email === ADMIN_EMAIL) {
        _adminUser = user;
        document.getElementById('admin-email-display').textContent = user.email;
        document.getElementById('admin-content').style.display = 'block';
        loadUsers();
        loadNotices();
        loadStats();
      } else {
        document.getElementById('access-denied').style.display = 'flex';
      }
    });

    /* 탭 전환 */
    function switchAdminTab(tab) {
      document.querySelectorAll('.admin-tab').forEach((btn, i) => {
        const tabs = ['users', 'notices', 'stats'];
        btn.classList.toggle('active', tabs[i] === tab);
      });
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
    }

    /* 토스트 */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* ─── 사용자 목록 ─── */
    async function loadUsers() {
      const container = document.getElementById('users-container');
      container.innerHTML = '<div class="empty-state">불러오는 중...</div>';
      try {
        const snap = await db.collection('users').orderBy('createdAt', 'desc').get();
        if (snap.empty) {
          container.innerHTML = '<div class="empty-state">가입한 사용자가 없습니다.</div>';
          return;
        }
        const rows = snap.docs.map(doc => {
          const d = doc.data();
          const created  = d.createdAt  ? _formatTs(d.createdAt)  : '-';
          const lastLogin = d.lastLoginAt ? _formatTs(d.lastLoginAt) : '-';
          const badge = d.provider === 'google.com'
            ? '<span class="badge badge-google">Google</span>'
            : '<span class="badge badge-email">이메일</span>';
          return `<tr>
            <td>${_esc(d.name || '-')}</td>
            <td>${_esc(d.email || '-')}</td>
            <td>${badge}</td>
            <td>${created}</td>
            <td>${lastLogin}</td>
          </tr>`;
        }).join('');

        container.innerHTML = `
          <table class="user-table">
            <thead><tr>
              <th>이름</th><th>이메일</th><th>가입 방법</th><th>가입일</th><th>최근 로그인</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`;

        document.getElementById('admin-summary-text').textContent =
          `총 ${snap.size}명의 가입 사용자`;
        document.getElementById('stat-users').textContent = snap.size;
      } catch (e) {
        container.innerHTML = '<div class="empty-state">불러오기 실패: ' + e.message + '</div>';
      }
    }

    /* ─── 공지사항 ─── */
    async function postNotice() {
      const title    = document.getElementById('notice-title').value.trim();
      const body     = document.getElementById('notice-body').value.trim();
      const priority = document.getElementById('notice-priority').value;
      if (!title || !body) { showToast('제목과 내용을 모두 입력하세요.'); return; }

      const btn = document.getElementById('notice-submit-btn');
      btn.disabled = true;
      btn.textContent = '등록 중...';

      try {
        await db.collection('notices').add({
          title,
          body,
          priority,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          authorEmail: ADMIN_EMAIL
        });
        document.getElementById('notice-title').value = '';
        document.getElementById('notice-body').value = '';
        document.getElementById('notice-priority').value = 'normal';
        showToast('공지사항이 등록되었습니다.');
        loadNotices();
      } catch (e) {
        showToast('등록 실패: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '공지 등록';
      }
    }

    async function loadNotices() {
      const container = document.getElementById('notices-list');
      container.innerHTML = '<div class="empty-state">불러오는 중...</div>';
      try {
        const snap = await db.collection('notices').orderBy('createdAt', 'desc').limit(50).get();
        if (snap.empty) {
          container.innerHTML = '<div class="empty-state">등록된 공지사항이 없습니다.</div>';
          return;
        }
        container.innerHTML = snap.docs.map(doc => {
          const d = doc.data();
          const date = d.createdAt ? _formatTs(d.createdAt) : '-';
          const priorityBadge = {
            urgent:    '<span style="color:#e74c3c;font-size:0.72rem;font-weight:700">[긴급]</span> ',
            important: '<span style="color:#f39c12;font-size:0.72rem;font-weight:700">[중요]</span> ',
            normal:    ''
          }[d.priority || 'normal'];
          return `
            <div class="notice-item">
              <div class="notice-item-header">
                <div class="notice-item-title">${priorityBadge}${_esc(d.title)}</div>
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="notice-item-meta">${date}</span>
                  <button class="btn-danger" onclick="deleteNotice('${doc.id}')">삭제</button>
                </div>
              </div>
              <div class="notice-item-body">${_esc(d.body)}</div>
            </div>`;
        }).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">불러오기 실패: ' + e.message + '</div>';
      }
    }

    async function deleteNotice(id) {
      if (!confirm('이 공지사항을 삭제하시겠습니까?')) return;
      try {
        await db.collection('notices').doc(id).delete();
        showToast('공지사항이 삭제되었습니다.');
        loadNotices();
      } catch (e) {
        showToast('삭제 실패: ' + e.message);
      }
    }

    /* ─── 방문자 통계 ─── */
    async function loadStats() {
      document.getElementById('stat-total').textContent = '-';
      document.getElementById('stat-today').textContent = '-';
      document.getElementById('stat-week').textContent = '-';

      try {
        const today = _dateKey(new Date());
        const snap  = await db.collection('pageViews').get();

        let total = 0, todayCount = 0, weekCount = 0;
        const pageMap = {};
        const dailyMap = {};

        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);

        snap.docs.forEach(doc => {
          const d = doc.data();
          const count = d.count || 0;
          const docDate = d.date || '';
          const page    = d.page  || 'home';

          total += count;
          pageMap[page] = (pageMap[page] || 0) + count;

          if (docDate === today) todayCount += count;

          const docDateObj = new Date(docDate);
          if (docDateObj >= weekAgo) weekCount += count;

          dailyMap[docDate] = (dailyMap[docDate] || 0) + count;
        });

        document.getElementById('stat-total').textContent = _fmt(total);
        document.getElementById('stat-today').textContent = _fmt(todayCount);
        document.getElementById('stat-week').textContent  = _fmt(weekCount);

        _renderPageChart(pageMap);
        _renderDailyChart(dailyMap);
      } catch (e) {
        document.getElementById('page-stats-chart').innerHTML =
          '<div class="empty-state">통계 불러오기 실패: ' + e.message + '</div>';
      }
    }

    function _renderPageChart(pageMap) {
      const container = document.getElementById('page-stats-chart');
      const entries = Object.entries(pageMap).sort((a, b) => b[1] - a[1]);
      if (!entries.length) {
        container.innerHTML = '<div class="empty-state">방문 데이터가 없습니다.</div>';
        return;
      }
      const maxVal = entries[0][1] || 1;
      container.innerHTML = entries.map(([page, count]) => `
        <div class="bar-row">
          <div class="bar-label">${PAGE_NAMES[page] || page}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(count/maxVal*100)}%"></div>
          </div>
          <div class="bar-count">${_fmt(count)}</div>
        </div>`).join('');
    }

    function _renderDailyChart(dailyMap) {
      const container = document.getElementById('daily-chart');
      const now = new Date();
      const days = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        days.push(_dateKey(d));
      }
      const maxVal = Math.max(...days.map(d => dailyMap[d] || 0), 1);
      container.innerHTML = `
        <div style="display:flex;align-items:flex-end;gap:3px;height:80px;padding-bottom:20px;position:relative;">
          ${days.map(d => {
            const v = dailyMap[d] || 0;
            const h = Math.max(Math.round(v / maxVal * 60), v > 0 ? 2 : 0);
            const label = d.slice(5);
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default" title="${d}: ${v}회">
              <div style="width:100%;height:${h}px;background:linear-gradient(180deg,#c5a059,#7a5c28);border-radius:2px 2px 0 0;min-height:${v>0?2:0}px"></div>
            </div>`;
          }).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:4px">
          <span>${days[0].slice(5)}</span>
          <span>${days[14].slice(5)}</span>
          <span>${days[29].slice(5)}</span>
        </div>`;
    }

    /* ─── 유틸 ─── */
    function _dateKey(d) {
      return d.toISOString().slice(0, 10);
    }

    function _formatTs(ts) {
      if (!ts) return '-';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' })
           + ' ' + d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    }

    function _fmt(n) {
      return n >= 10000 ? (n/10000).toFixed(1) + '만' : n.toLocaleString();
    }

    function _esc(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
